<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Définition de l'ombre portée vers le bas à droite -->
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="1.5" dy="1.5" stdDeviation="0.8" flood-color="#292929" flood-opacity="0.8"/>
    </filter>
  </defs>


  <!-- Fond gris très foncé avec coins arrondis -->
  <rect width="32" height="32" rx="6" fill="#696969"/>


  <!-- Lettre G grande, fine, avec ombre bas-droite -->
  <text
    x="50%"
    y="60%"
    font-family="system-ui, -apple-system, Arial, sans-serif"
    font-size="33"
    font-weight="700"
    fill="#dddddd"
    text-anchor="middle"
    dominant-baseline="middle"
    filter="url(#shadow)"
  >G</text>
</svg>







